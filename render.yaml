services:
  # Frontend Angular
  - type: web
    name: microsservicos-frontend
    env: docker
    plan: free
    dockerfilePath: frontend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NGINX_HOST
        value: localhost
      - key: NGINX_PORT
        value: "8080"

  # Serviço de Estoque
  - type: web
    name: microsservicos-estoque
    env: docker
    plan: free
    dockerfilePath: Servico.Estoque/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__ConexaoPadrao
        fromDatabase:
          name: postgres-korp
          property: connectionString
      - key: EstoqueServiceUrl
        value: https://microsservicos-estoque.onrender.com

  # Serviço de Faturamento
  - type: web
    name: microsservicos-faturamento
    env: docker
    plan: free
    dockerfilePath: Servico.Faturamento/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__ConexaoPadrao
        fromDatabase:
          name: postgres-korp
          property: connectionString
      - key: EstoqueServiceUrl
        value: https://microsservicos-estoque.onrender.com

  # Banco de dados PostgreSQL
  - type: pserv
    name: postgres-korp
    env: postgres
    plan: free
    ipAllowList: []
    version: 15
